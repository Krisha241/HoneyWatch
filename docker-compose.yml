services:

  db:
    image: postgres:16-alpine
    container_name: honeywatch_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeywatch_backend
    ports:
      - "8000:8000"     # FastAPI dashboard API
      - "2222:2222"     # Fake SSH honeypot
      - "8080:8080"     # Fake HTTP honeypot
      - "2121:2121"     # Fake FTP honeypot
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data: